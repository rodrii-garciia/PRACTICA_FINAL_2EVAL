<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>UFC Athletes</title>
    <link rel="stylesheet" href="styles/mainStyle.css" />
    <script src="scripts/app.js" defer></script>
  </head>
  <body>
    <header>
      <div class="escogerModo">
        <label for="modoDia">
          <img src="assets/img/iconos/sol-dia.png" alt="Sol" id="iconoSol"/>
        </label>
        <input type="radio" name="modoColores" id="modoDia" class="inputsRadio" checked/>

        <label for="modoNoche">
          <img src="assets/img/iconos/luna-dia.png" alt="Luna" id="iconoLuna"/>
        </label>
        <input type="radio" name="modoColores" id="modoNoche" class="inputsRadio"/>

        <label for="modoCustom">
          <img src="assets/img/iconos/custom-dia.png" alt="Custom" id="iconoCustom">
        </label>
        <input type="radio" name="modoColores" id="modoCustom" class="inputsRadio">
        <div id="divCustom">
          <!-- Aquí irán los inputs para el modoCustom-->
        </div>
      </div>

      <h2 onclick="window.open('https://www.ufc.com', '_blank')">UFC</h2>
      <div class="iconosDerecha posicionOriginal">
        <img
          src="assets/img/iconos/subir-dia.png"
          alt="Subida nueva tarjeta"
          id="iconoSubir"
        />
        <img
          src="assets/img/iconos/lupa-dia.png"
          alt="Lupa para buscar"
          id="iconoLupa"
        />
      </div>
      <form id="formularioBusqueda">
        <input
          type="text"
          id="inputFiltrado"
          placeholder="Ingrese el nombre o país a buscar..."
        />
      </form>
    </header>
    <main>
      <ul id="listaPeleadores">
        <!-- Aquí se irán insertando dinámicamente los peleadores-->
      </ul>
      <form id="anyadirTarjeta">
        <img
          src="assets/img/iconos/cerrar-dia.png"
          alt="cerrarModal"
          id="imagenCerrarFormulario"
        />
        <label for="nombre">Nombre del peleador*</label>
        <input
          type="text"
          id="nombre"
          name="nombre"
          placeholder="Ej: Anderson"
          required
        />
        <label for="apellido">Apellido del peleador*</label>
        <input
          type="text"
          id="apellido"
          name="apellido"
          placeholder="Ej: Silva"
          required
        />
        <label for="alias">Alias del peleador</label>
        <input type="text" id="alias" name="alias" placeholder="Ej: Spider" />
        <label for="pais">País del peleador*</label>
        <input
          type="text"
          id="pais"
          name="pais"
          placeholder="Ej: Brasil"
          required
        />
        <label for="cita">Cita del peleador</label>
        <input
          type="text"
          id="cita"
          name="cita"
          placeholder="Ej: I’m not the best, but I believe I can do great things"
        />
        <label for="imagenLocal" id="btnImagenLocal">Seleccione una imagen</label>
        <span id="nombreArchivo">Ningún archivo seleccionado</span>
        <input type="file" id="imagenLocal" accept="image/*" />

        <button type="submit">Enviar</button>
      </form>
    </main>
    <footer>
      <p>UFC Athletes©</p>
      <p>David López Zurrón y Rodrigo García Sánchez</p>
    </footer>
  </body>
</html>
